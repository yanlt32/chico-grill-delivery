services:
  - type: web
    name: chico-grill-api
    env: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

  - type: web
    name: chico-grill-frontend
    env: static
    plan: free
    buildCommand: echo "No build needed"
    staticPublishPath: frontend
