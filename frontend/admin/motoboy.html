<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregas — CHICO GRILL</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-dot" style="background:var(--blue);box-shadow:0 0 8px var(--blue)"></div>
                CHICO GRILL &nbsp;/&nbsp; Entregas
            </div>
            <div class="header-stats">
                <div class="stat-pill">
                    <span class="count" id="count-prontos" style="color:var(--success)">0</span>
                    <span class="label">Prontos</span>
                </div>
                <div class="stat-pill">
                    <span class="count" id="count-rota" style="color:var(--blue)">0</span>
                    <span class="label">Em rota</span>
                </div>
                <div class="stat-pill">
                    <span class="count" id="count-entregues" style="color:var(--text-muted)">0</span>
                    <span class="label">Entregues hoje</span>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:1rem">
                <div class="clock" id="clock">--:--:--</div>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="kanban">
            <div class="kanban-col">
                <div class="kanban-header">
                    <div class="kanban-title">
                        <div class="dot dot-green"></div>
                        Prontos para Entrega
                    </div>
                    <div class="kanban-count" id="badge-prontos">0</div>
                </div>
                <div class="kanban-body" id="col-prontos"></div>
            </div>

            <div class="kanban-col">
                <div class="kanban-header">
                    <div class="kanban-title">
                        <div class="dot dot-blue"></div>
                        Em Rota
                    </div>
                    <div class="kanban-count" id="badge-rota">0</div>
                </div>
                <div class="kanban-body" id="col-rota"></div>
            </div>

            <div class="kanban-col">
                <div class="kanban-header">
                    <div class="kanban-title">
                        <div class="dot" style="background:#444"></div>
                        Entregues
                    </div>
                    <div class="kanban-count" id="badge-entregues">0</div>
                </div>
                <div class="kanban-body" id="col-entregues"></div>
            </div>
        </div>
    </main>

    <div class="login-modal-overlay" id="login-modal">
        <div class="login-modal-card">
            <h2>Acesso Motoboy</h2>
            <p>Digite seu email e senha para acessar o painel de entregas.</p>
            <div class="form-group">
                <label>Email</label>
                <input id="login-email" type="email" placeholder="motoboy@chicogrill.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input id="login-password" type="password" placeholder="Senha do motoboy">
                <div class="login-error" id="login-error"></div>
            </div>
            <button class="btn btn-primary btn-block" type="button" onclick="submitLogin()">Entrar</button>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.5.4/socket.io.js"></script>
    <script src="motoboy.js"></script>
</body>
</html>
